name: Table Scraper (21f1006164@ds.study.iitm.ac.in)

on: [push]  # Runs on every push to any branch

jobs:
  scrape:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 21f1006164@ds.study.iitm.ac.in - Install Playwright
        run: |
          npm init -y
          npm install playwright@latest
      
      - name: 21f1006164@ds.study.iitm.ac.in - Run Scraper
        run: node scrape.js
      
      - name: 21f1006164@ds.study.iitm.ac.in - Upload Logs (if needed)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-logs
          path: |
            *.log
